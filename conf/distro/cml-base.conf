require conf/distro/poky-tiny.conf
DISTRO = "cml-base"
DISTRO_NAME = "GyroidOS CML (CML Base Distribution)"
DISTRO_VERSION:prepend = "1.1-"
MAINTAINER = "GyroidOS <gyroidos@aisec.fraunhofer.de>"
DISTROOVERRIDES = "poky-tiny:cml-base"
TARGET_VENDOR = "-gyroidos"

INITRAMFS_MAXSIZE = '${@oe.utils.vartrue('DEVELOPMENT_BUILD', "350000", "75000", d)}'

# Toggle for the CI/serial console-capture path (kernel console=, GYROIDOS_LOGTTY,
# dump-diag, the /dev/ttyS2 node). Default off; set to "y" (e.g. via the Jenkins
# parameter) to build a hardware-deployable image with the CI console redirected.
# Weak default so builds that do not go through the local.conf template still
# have it defined.
CI_CONSOLE_REDIRECT ??= "n"

PACKAGECONFIG:remove:pn-gdb = "python"

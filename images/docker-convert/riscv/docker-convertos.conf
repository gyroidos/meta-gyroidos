name: "docker-convert"
hardware: "riscv"
version: 1
init_path: "/sbin/cservice"
init_param: "init"
init_env: "container=gyroidos"
mounts {
	image_file: "root"
	mount_point: "/"
	fs_type: "squashfs"
	mount_type: SHARED_RW
}
mounts {
	image_file: "pki_generator"
	mount_point: "/pki_generator"
	fs_type: "ext4"
	mount_type: OVERLAY_RW
}
mounts {
	image_file: "tmp"
	mount_point: "/tmp"
	fs_type: "ext4"
	mount_type: EMPTY
	def_size: 10240
}
mounts {
	image_file: "tmpfs"
	mount_point: "/data/"
	fs_type: "tmpfs"
	mount_type: EMPTY
	def_size: 12
}
description {
	en: "docker converter (riscv)"
}
feature_install_guest: true
